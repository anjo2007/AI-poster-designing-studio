    <style>
      @keyframes blob-1 { 0% {transform: translate(0, 0) scale(1);} 33% {transform: translate(30vw, -40vh) scale(1.2);} 66% {transform: translate(-20vw, 20vh) scale(0.8);} 100% {transform: translate(0, 0) scale(1);} }

      @keyframes blob-2 { 0% {transform: translate(0, 0) scale(1);} 33% {transform: translate(-25vw, 30vh) scale(0.7);} 66% {transform: translate(35vw, -10vh) scale(1.3);} 100% {transform: translate(0, 0) scale(1);} }
      .animate-blob-2 { animation: blob-2 18s infinite ease-in-out; animation-delay: 3s; }
      @keyframes blob-3 { 0% {transform: translate(0, 0) scale(1);} 33% {transform: translate(10vw, 35vh) scale(0.9);} 66% {transform: translate(-30vw, -30vh) scale(1.1);} 100% {transform: translate(0, 0) scale(1);} }
      .animate-blob-3 { animation: blob-3 21s infinite ease-in-out; animation-delay: 6s; }
    </style>
